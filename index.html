<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // OPERATIVE</title>
    <style>
        :root { 
            --neon-green: #00ff41; --neon-red: #ff3131; --neon-yellow: #f9d71c; 
            --bg: #020202; --card: #0a0a0a; 
        }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .market-header { 
            background: var(--card); border: 1px solid #1a1a1a; border-radius: 8px; 
            padding: 15px; margin-bottom: 20px; border-top: 3px solid var(--neon-green);
        }
        .op-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .asset-card { 
            background: var(--card); border: 1px solid #1a1a1a; border-radius: 6px; 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .badge { padding: 4px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; border: 1px solid; min-width: 60px; text-align: center; }
        .sync-bar { font-size: 9px; color: var(--neon-green); text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="market-header">
    <small style="color:#666">B3 // IBOVESPA (COLETIVIDADE)</small>
    <div style="font-size: 24px; font-weight: 800;">107.200,56</div>
    <div style="color: var(--neon-red); font-size: 12px;">-1.04%</div>
</div>

<div id="sync-status" class="sync-bar">INICIANDO PROTOCOLO V.85...</div>
<div class="op-grid" id="asset-list"></div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    // Seus 10 ativos originais com os sinais de decisão IPI
    const TICKETS = [
        {t: 'VALE3.SAO', s: 'ENTRA'}, {t: 'PETR4.SAO', s: 'PULA'}, 
        {t: 'ITUB4.SAO', s: 'ENTRA'}, {t: 'BBAS3.SAO', s: 'ENTRA'}, 
        {t: 'ABEV3.SAO', s: 'PULA'}, {t: 'B3SA3.SAO', s: 'PULA'}, 
        {t: 'ELET3.SAO', s: 'ENTRA'}, {t: 'WEGE3.SAO', s: 'ENTRA'}, 
        {t: 'RENT3.SAO', s: 'PULA'}, {t: 'MGLU3.SAO', s: 'NÃO ENTRA'}
    ];

    async function fetchBatch(startIndex, endIndex) {
        const list = document.getElementById('asset-list');
        const status = document.getElementById('sync-status');
        
        for (let i = startIndex; i < endIndex; i++) {
            const item = TICKETS[i];
            try {
                const response = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${item.t}&apikey=${API_KEY}`);
                const data = await response.json();
                const quote = data["Global Quote"];
                
                if (quote) {
                    const price = parseFloat(quote["05. price"]).toFixed(2);
                    const change = parseFloat(quote["10. change percent"]).toFixed(2);
                    const badgeColor = item.s === 'ENTRA' ? 'var(--neon-green)' : (item.s === 'PULA' ? 'var(--neon-yellow)' : 'var(--neon-red)');
                    
                    list.innerHTML += `
                        <div class="asset-card">
                            <div>
                                <div style="font-weight:800; font-size:16px">${item.t.split('.')[0]}</div>
                                <div style="font-size:10px; color:#444">R$ ${price} (${change}%)</div>
                            </div>
                            <div class="badge" style="color:${badgeColor}; border-color:${badgeColor}">${item.s}</div>
                        </div>`;
                }
            } catch (e) { console.error("Erro na API:", e); }
        }

        if (endIndex < TICKETS.length) {
            status.innerText = "AGUARDANDO JANELA DE SEGURANÇA (60S)...";
            setTimeout(() => {
                status.innerText = "SINCRONIZANDO LOTE FINAL...";
                fetchBatch(5, 10);
            }, 61000);
        } else {
            status.innerText = "● SISTEMA 100% ONLINE // DADOS REAIS";
        }
    }

    // Inicia o processo
    fetchBatch(0, 5);
</script>
</body>
</
    html>
