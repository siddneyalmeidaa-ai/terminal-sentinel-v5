<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL V6.0 // OPERAÇÃO BLINDADA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; border-left: 6px solid #00ff41; margin-bottom: 15px; }
        .price { font-size: 32px; font-weight: bold; margin: 10px 0; }
        #debug { font-family: monospace; color: #555; font-size: 10px; margin-top: 20px; border-top: 1px solid #111; padding-top: 10px; }
    </style>
</head>
<body>

<div id="status">SENTINEL V6.0 ATIVO // 20:21:00</div>
<hr border="1" color="#111">

<div id="app">Aguardando motor de busca...</div>

<div id="debug">LOG DO SISTEMA: Pronto para teste.</div>

<script>
    // CHAVES FIXAS PARA ELIMINAR ERRO DE LEITURA [cite: 2026-02-28]
    const API_COTACAO = "3YfY2Nvp75kG9ANMx4vrDx";
    const API_NOTICIAS = "BBA9X8Q14OFJIBRZ";

    async function motor() {
        const app = document.getElementById('app');
        const log = document.getElementById('debug');
        
        try {
            log.innerText = "Buscando dados da PETR4...";
            
            // BUSCA DIRETA [cite: 2026-02-28]
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=PETR4.SAO&apikey=${API_COTACAO}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data["Note"]) {
                app.innerHTML = '<div class="card" style="border-color:orange">AVISO: Limite da API atingido. Aguardando 1 minuto...</div>';
                return;
            }

            if (data["Global Quote"]) {
                const q = data["Global Quote"];
                const preco = parseFloat(q["05. price"]).toFixed(2);
                const osc = q["10. change percent"];
                
                app.innerHTML = `
                    <div class="card">
                        <small>PETR4.SAO</small>
                        <div class="price">R$ ${preco}</div>
                        <div style="color:#00ff41">Oscilação: ${osc}</div>
                    </div>
                `;
                log.innerText = "Sincronizado com sucesso.";
            } else {
                app.innerHTML = '<div class="card" style="border-color:red">ERRO: Chave rejeitada pela Alpha Vantage.</div>';
            }

        } catch (e) {
            app.innerHTML = '<div class="card" style="border-color:red">ERRO CRÍTICO DE CONEXÃO.</div>';
            log.innerText = "Erro: " + e.message;
        }
    }

    // Inicia após 1 segundo
    setTimeout(motor, 1000);
</script>
</body>
    
</html>
