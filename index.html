<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V9.1 // FÊNIX PRIME</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; overflow-x: hidden; }
        .header { border-bottom: 2px solid #00ff41; padding: 10px 0; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #333; position: relative; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .ticket-name { font-size: 18px; font-weight: 900; color: #fff; }
        .price { font-size: 32px; font-weight: bold; margin: 5px 0; color: #00ff41; display: flex; align-items: center; gap: 8px; }
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; background: #1a1a1a; }
        
        /* NOVO: NEWS TICKER [cite: 2026-02-28] */
        .label { font-size: 9px; color: #444; text-transform: uppercase; font-weight: bold; margin-top: 10px; border-top: 1px solid #111; padding-top: 5px; }
        .news-container { background: #050505; border-radius: 4px; padding: 5px; margin-top: 5px; overflow: hidden; white-space: nowrap; }
        .news-scroll { display: inline-block; font-size: 10px; color: #00ff41; font-family: monospace; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .pulse { width: 8px; height: 8px; background: #00ff41; border-radius: 50%; display: inline-block; animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .value { font-size: 11px; color: #999; margin-top: 2px; }
        #status-log { font-family: monospace; color: #333; font-size: 9px; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <span>SENTINEL_V9.1 // LIVE FEED</span>
    <span id="timer">00:00:00</span>
</div>

<div id="painel" class="grid">
    <div class="card" style="border-color:#333">Injetando Live Feed...</div>
</div>

<div id="status-log">LOG: Handshake Cloudflare Bridge...</div>

<script>
    const motorURL = "https://snowy-paper-0f66.siddney-almeidaa.workers.dev";

    async function ignition() {
        const painel = document.getElementById('painel');
        const log = document.getElementById('status-log');

        try {
            const res = await fetch('sentinel_data.json');
            if (!res.ok) throw new Error("Erro ao ler JSON local");
            const agentes = await res.json();
            
            painel.innerHTML = ''; 

            for (let a of agentes) {
                const cor = a.semaforo === "ENTRA" ? "#00ff41" : (a.semaforo === "PULA" ? "#ffaa00" : "#ff3131");
                const cardId = `price-${a.ticket}`;
                
                painel.innerHTML += `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket-row">
                            <span class="ticket-name">${a.ticket}</span>
                            <span class="status-pill" style="color: ${cor}; border: 1px solid ${cor}">${a.semaforo}</span>
                        </div>
                        <div class="price">
                            <span class="pulse" style="background-color: ${cor}"></span>
                            <span id="${cardId}">BUSCANDO...</span>
                        </div>
                        <div class="label">Últimas 24h // Gatilhos</div>
                        <div class="news-container">
                            <div class="news-scroll">LIVE: ${a.hist_24h} // FOCO: ${a.gatilhos}</div>
                        </div>
                        <div class="label">Operacional</div>
                        <div class="value">Trava: ${a.trava} | Perf: ${a.perf_12m}</div>
                    </div>`;

                fetch(`${motorURL}?ticket=${a.ticket}`)
                    .then(r => r.json())
                    .then(data => {
                        let p = data.price || (data.results && data.results[0].regularMarketPrice) || (data[0] && data[0].price);
                        const el = document.getElementById(cardId);
                        if (p) {
                            el.innerText = `R$ ${p.toFixed(2)}`;
                            el.style.color = "#00ff41";
                        } else {
                            el.innerText = "SEM SINAL";
                        }
                    })
                    .catch(() => {
                        const el = document.getElementById(cardId);
                        el.innerText = "ERRO TÚNEL";
                        el.style.color = "#ff3131";
                    });
            }
            log.innerText = "SISTEMA: " + agentes.length + " agentes operando via Cloudflare Bridge.";
        } catch (err) {
            log.innerText = "ERRO NA IGNIÇÃO: " + err.message;
        }
    }

    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
    setTimeout(ignition, 500);
</script>
</body>
    
</html>
