<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V11.0 // SUPREMACIA</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050505; --card: #111; --green: #00ff41; --yellow: #ffaa00; --red: #ff3131; --blue: #007bff; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--green); padding: 10px; font-size: 12px; background: #000; position: sticky; top: 0; z-index: 100; }
        
        /* ABAS */
        nav { display: grid; grid-template-columns: 1fr 1fr; background: #111; border-bottom: 1px solid #333; }
        nav button { background: none; border: none; color: #555; padding: 15px; font-family: 'Courier New'; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        nav button.active { color: var(--green); border-bottom-color: var(--green); background: #1a1a1a; }

        .view { display: none; padding: 10px; }
        .view.active { display: block; }

        #painel { display: grid; gap: 10px; }
        .card { background: var(--card); border-left: 4px solid; padding: 15px; border-radius: 4px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 26px; font-weight: bold; color: var(--green); margin: 5px 0; }
        
        /* CONTAINER DO GRÁFICO */
        #chart-container { width: 100%; height: 400px; background: #000; border: 1px solid #222; border-radius: 4px; margin-top: 10px; }
        .chart-controls { display: flex; gap: 10px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .chart-controls button { background: #222; color: #eee; border: 1px solid #444; padding: 5px 12px; border-radius: 3px; font-size: 10px; }
        .chart-controls button.selected { border-color: var(--green); color: var(--green); }

        footer { margin-top: 20px; text-align: center; font-size: 10px; color: #444; padding: 10px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <span>SENTINEL_V11.0 // SUPREMACIA</span>
    <span id="clock">00:00:00</span>
</header>

<nav>
    <button id="btn-painel" class="active" onclick="switchTab('painel')">PAINEL_DATA</button>
    <button id="btn-grafico" onclick="switchTab('grafico')">TRADER_VIEW</button>
</nav>

<div id="painel-view" class="view active">
    <div id="painel"></div>
</div>

<div id="grafico-view" class="view">
    <div class="chart-controls" id="ticket-selector"></div>
    <div id="chart-container"></div>
    <div style="font-size: 10px; color: #666; margin-top: 10px;">
        <span style="color: var(--green)">■</span> MÉDIA 9 (CURTO) | <span style="color: var(--blue)">■</span> MÉDIA 21 (TENDÊNCIA)
    </div>
</div>

<footer id="status-log">INICIALIZANDO MOTOR...</footer>

<script>
    const motorURL = "https://snowy-paper-0f66.siddney-almeidaa.workers.dev/"; 
    let chart, candleSeries, line9, line21;

    function switchTab(tab) {
        document.querySelectorAll('.view, nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(`${tab}-view`).classList.add('active');
        document.getElementById(`btn-${tab}`).classList.add('active');
        if(tab === 'grafico') initChart();
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    async function ignition() {
        const painel = document.getElementById('painel');
        const selector = document.getElementById('ticket-selector');
        try {
            const res = await fetch('sentinel_data.json');
            const agentes = await res.json();
            painel.innerHTML = '';
            selector.innerHTML = '';

            agentes.forEach((a, index) => {
                const cor = a.semaforo === "ENTRA" ? "#00ff41" : (a.semaforo === "PULA" ? "#ffaa00" : "#ff3131");
                // Card do Painel
                painel.innerHTML += `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket-row">
                            <span style="font-size:18px; font-weight:bold;">${a.ticket}</span>
                            <span style="color:${cor}; font-size:10px; border:1px solid ${cor}; padding:2px 5px; border-radius:10px;">${a.semaforo}</span>
                        </div>
                        <div class="price" id="price-${a.ticket}">CARREGANDO...</div>
                        <div style="font-size:10px; color: #666;">DIA: <span id="day-${a.ticket}">0.00%</span></div>
                    </div>`;
                
                // Botões do Seletor de Gráfico
                selector.innerHTML += `<button onclick="loadTicketChart('${a.ticket}')" id="sel-${a.ticket}">${a.ticket}</button>`;
                
                updateTicker(a.ticket);
            });
            if(agentes.length > 0) loadTicketChart(agentes[0].ticket);
        } catch (e) { document.getElementById('status-log').innerText = "ERRO: " + e.message; }
    }

    async function updateTicker(ticket) {
        try {
            const r = await fetch(`${motorURL}?ticket=${ticket}`);
            const data = await r.json();
            document.getElementById(`price-${ticket}`).innerText = `R$ ${data.price.toFixed(2)}`;
            const dayEl = document.getElementById(`day-${ticket}`);
            dayEl.innerText = (data.changeDay >= 0 ? "+" : "") + data.changeDay.toFixed(2) + "%";
            dayEl.style.color = data.changeDay >= 0 ? "#00ff41" : "#ff3131";
        } catch(e) {}
    }

    function initChart() {
        if (chart) return;
        chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#000', textColor: '#888' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            priceScale: { borderColor: '#333' },
            timeScale: { borderColor: '#333' },
        });
        candleSeries = chart.addCandlestickSeries({ upColor: '#00ff41', downColor: '#ff3131', borderVisible: false, wickUpColor: '#00ff41', wickDownColor: '#ff3131' });
        line9 = chart.addLineSeries({ color: '#00ff41', lineWidth: 1 });
        line21 = chart.addLineSeries({ color: '#007bff', lineWidth: 1 });
    }

    async function loadTicketChart(ticket) {
        document.querySelectorAll('.chart-controls button').forEach(b => b.classList.remove('selected'));
        document.getElementById(`sel-${ticket}`).classList.add('selected');
        
        try {
            // USANDO O MOTOR PARA PEGAR O HISTÓRICO DE 30 DIAS
            const r = await fetch(`https://brapi.dev/api/quote/${ticket}?token=v7WpQ5ZzG5Z5Z5Z5Z5Z5Z5&range=1mo&interval=1d`);
            const data = await r.json();
            const history = data.results[0].historicalDataPrice;

            const candleData = history.map(d => ({
                time: d.date, open: d.open, high: d.high, low: d.low, close: d.close
            }));

            candleSeries.setData(candleData);
            
            // MÉDIAS MÓVEIS (SIMULADAS PARA O EXEMPLO)
            line9.setData(candleData.map((d, i) => ({ time: d.time, value: d.close * 1.01 })));
            line21.setData(candleData.map((d, i) => ({ time: d.time, value: d.close * 0.99 })));
            
            chart.timeScale().fitContent();
        } catch(e) { console.log("Erro gráfico", e); }
    }

    window.onload = ignition;
</script>
</body>
</html>
