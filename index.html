<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // COMMAND CENTER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-green: #00ff41; --neon-red: #ff3300; --neon-yellow: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: var(--neon-green); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; margin-bottom: 30px; }
        
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 8px; transition: 0.3s; text-align: center; }
        .card:hover { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        
        .status-entra { border-top: 4px solid var(--neon-green); }
        .status-pula { border-top: 4px solid var(--neon-yellow); }
        .status-nao { border-top: 4px solid var(--neon-red); }

        .ticket-name { font-size: 20px; font-weight: bold; display: block; }
        .ipi-label { font-size: 12px; text-transform: uppercase; margin-top: 10px; display: block; }
        
        .chart-container { background: #0a0a0a; padding: 20px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .news-ticker { margin-top: 20px; background: #111; padding: 10px; border-left: 4px solid var(--neon-green); font-size: 13px; color: #00ccff; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0;">SENTINEL V5 // OPERATIVE DASHBOARD</h2>
        <small>SYNC: ALPHA_VANTAGE_REALTIME</small>
    </div>
    <div style="text-align: right;">
        <span id="clock">17:31:00</span><br>
        <small>STATUS: BLINDADO</small>
    </div>
</div>

<div class="container">
    <div class="grid-cards" id="cards-container">
        </div>

    <div class="chart-container">
        <canvas id="sentinelChart"></canvas>
        <div id="active-news" class="news-ticker">Selecione um ativo para ver o histórico 24h...</div>
    </div>
</div>

<script>
    async function initDashboard() {
        const response = await fetch('sentinel_data.json');
        const data = await response.json();
        
        const cardsCont = document.getElementById('cards-container');
        const newsTicker = document.getElementById('active-news');
        
        // Criar Cards
        data.forEach(item => {
            const statusClass = item.semaforo.toLowerCase().replace(" ", "-");
            const card = document.createElement('div');
            card.className = `card status-${statusClass}`;
            card.innerHTML = `
                <span class="ticket-name">${item.ticket}</span>
                <small>${item.trava} TRAVA</small>
                <span class="ipi-label">${item.semaforo}</span>
            `;
            card.onclick = () => {
                newsTicker.innerHTML = `<strong>${item.ticket} NEWS:</strong> ${item.hist_24h}`;
            };
            cardsCont.appendChild(card);
        });

        // Criar Gráfico de Radar
        const ctx = document.getElementById('sentinelChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: data.map(i => i.ticket),
                datasets: [{
                    label: 'Pontuação de Oportunidade (IPI)',
                    data: data.map(i => i.semaforo === 'ENTRA' ? 10 : (i.semaforo === 'PULA' ? 5 : 2)),
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 65, 0.1)',
                    borderColor: '#00ff41',
                    pointBackgroundColor: '#00ff41'
                }]
            },
            options: {
                scales: { r: { angleLines: { color: '#222' }, grid: { color: '#222' }, pointLabels: { color: '#00ff41' }, ticks: { display: false } } },
                plugins: { legend: { labels: { color: '#00ff41' } } }
            }
        });
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    initDashboard();
</script>

</body>

</html>
