<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL V6.1 // SYDNEY</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; border-left: 6px solid #00ff41; margin-bottom: 15px; }
        .ticket { font-size: 14px; color: #888; letter-spacing: 1px; }
        .price { font-size: 38px; font-weight: bold; margin: 10px 0; }
        .osc { font-size: 18px; font-weight: bold; }
        #debug-log { font-family: monospace; color: #444; font-size: 11px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="header">
    <span>SENTINEL V6.1 // ATIVO</span>
    <span id="clock">20:25:00</span>
</div>

<div id="app">
    <div class="card" style="border-left-color: #333;">Iniciando varredura de mercado...</div>
</div>

<div id="debug-log">SISTEMA: Aguardando resposta da Alpha Vantage...</div>

<script>
    // INVERSÃO DE CHAVES
    const KEY_COTACAO = "BBA9X8Q14OFJIBRZ"; // Chave 2 (Nova)
    const KEY_NEWS = "3YfY2Nvp75kG9ANMx4vrDx";    // Chave 1 (Original)

    async function processar() {
        const app = document.getElementById('app');
        const log = document.getElementById('debug-log');
        
        try {
            log.innerText = "Sincronizando PETR4 via Chave BBA9X...";
            
            const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=PETR4.SAO&apikey=${KEY_COTACAO}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data["Note"]) {
                app.innerHTML = '<div class="card" style="border-color:#f9d71c">LIMITE EXCEDIDO: A API pediu 60 segundos de espera.</div>';
                log.innerText = "STATUS: Aguardando cooldown.";
                return;
            }

            if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                const g = data["Global Quote"];
                const p = parseFloat(g["05. price"]).toFixed(2);
                const o = parseFloat(g["10. change percent"].replace('%','')).toFixed(2);
                const cor = o >= 0 ? "#00ff41" : "#ff3131";

                app.innerHTML = `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket">PETR4.SAO</div>
                        <div class="price">R$ ${p}</div>
                        <div class="osc" style="color: ${cor}">${o}%</div>
                    </div>
                `;
                log.innerText = "SISTEMA: Cotação atualizada com sucesso.";
            } else {
                app.innerHTML = '<div class="card" style="border-color:red">ERRO: Chave ainda não autorizada para este domínio.</div>';
                log.innerText = "DETALHE: Verifique se a chave foi colada sem espaços.";
            }
        } catch (e) {
            app.innerHTML = '<div class="card" style="border-color:red">FALHA DE CONEXÃO.</div>';
            log.innerText = "ERRO: " + e.message;
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setTimeout(processar, 1000);
</script>
</body>
    
</html>
