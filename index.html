<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // SYDNEY</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --yellow: #f9d71c; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { border-bottom: 2px solid var(--green); padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .radar-box { background: var(--card); height: 200px; margin-bottom: 10px; border-radius: 8px; }
        .asset-card { background: var(--card); border: 1px solid #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 10px; font-weight: bold; padding: 4px 8px; border: 1px solid; border-radius: 3px; }
        #intel { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--green); padding: 8px; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">
    <span><b>SENTINEL V5</b> // BLINDADO</span>
    <span id="clock" style="color:var(--green)">19:11</span>
</div>

<div class="radar-box"><canvas id="radar"></canvas></div>
<div id="list"></div>
<div id="intel"><b style="color:var(--green)">ACTIVE INTEL:</b> <span id="news">Sincronizando base de dados...</span></div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    const TICKETS = [
        {t:'VALE3.SAO', s:'ENTRA', v:90, p:'72.45'}, {t:'PETR4.SAO', s:'PULA', v:40, p:'38.12'},
        {t:'ITUB4.SAO', s:'ENTRA', v:85, p:'32.90'}, {t:'BBAS3.SAO', s:'ENTRA', v:88, p:'54.20'},
        {t:'ABEV3.SAO', s:'PULA', v:30, p:'11.80'}, {t:'B3SA3.SAO', s:'PULA', v:35, p:'10.50'},
        {t:'ELET3.SAO', s:'ENTRA', v:82, p:'41.30'}, {t:'WEGE3.SAO', s:'ENTRA', v:80, p:'36.15'},
        {t:'RENT3.SAO', s:'PULA', v:45, p:'58.90'}, {t:'MGLU3.SAO', s:'NÃO ENTRA', v:15, p:'1.95'}
    ];

    function render() {
        const container = document.getElementById('list');
        container.innerHTML = '';
        TICKETS.forEach(item => {
            const data = JSON.parse(localStorage.getItem(item.t)) || {price: item.p, change: '0.00'};
            const color = item.s === 'ENTRA' ? 'var(--green)' : (item.s === 'PULA' ? 'var(--yellow)' : 'var(--red)');
            container.innerHTML += `<div class="asset-card">
                <div><b>${item.t.split('.')[0]}</b><br><small style="color:#666">R$ ${data.price} (${data.change}%)</small></div>
                <div class="badge" style="color:${color}; border-color:${color}">${item.s}</div>
            </div>`;
        });
    }

    async function sync() {
        for (let i = 0; i < TICKETS.length; i++) {
            if (i === 5) await new Promise(r => setTimeout(r, 61000));
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${TICKETS[i].t}&apikey=${API_KEY}`);
                const d = await res.json();
                if (d["Global Quote"]) {
                    const q = d["Global Quote"];
                    localStorage.setItem(TICKETS[i].t, JSON.stringify({price: parseFloat(q["05. price"]).toFixed(2), change: parseFloat(q["10. change percent"]).toFixed(2)}));
                    document.getElementById('news').innerText = `Atualizado: ${TICKETS[i].t.split('.')[0]}`;
                    render();
                }
            } catch (e) { console.log("Limite API"); }
        }
    }

    new Chart(document.getElementById('radar'), {
        type: 'radar',
        data: { labels: TICKETS.map(x => x.t.split('.')[0]), datasets: [{ data: TICKETS.map(x => x.v), backgroundColor: 'rgba(0,255,65,0.1)', borderColor: '#00ff41', borderWidth: 1 }] },
        options: { scales: { r: { grid: { color: '#222' }, angleLines: { color: '#222' }, ticks: { display: false } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
    });

    render(); sync();
</script>
</body>
<
    /html>
