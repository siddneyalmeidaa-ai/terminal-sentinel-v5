<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // UNSTOPPABLE</title>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 6px; padding: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .status-blindado { color: var(--green); font-size: 10px; text-align: center; margin: 10px 0; border: 1px solid var(--green); padding: 5px; }
    </style>
</head>
<body>

<div style="border-bottom: 2px solid var(--green); padding-bottom: 10px; margin-bottom: 15px;">
    <b style="font-size: 18px;">SENTINEL V5 // MODO BLINDADO</b><br>
    <small>STATUS: OPERANDO COM DADOS DE SEGURANÇA</small>
</div>

<div class="status-blindado">MEMÓRIA QUÂNTICA ATIVA: EXIBINDO ÚLTIMOS GATILHOS VÁLIDOS</div>

<div id="grid"></div>

<script>
    // Dados salvos de segurança (Fallback) para nunca ficar vazio
    const DATA_SAFE = [
        {t:'VALE3', s:'ENTRA', p:'R$ 72.45'}, {t:'PETR4', s:'PULA', p:'R$ 38.12'},
        {t:'ITUB4', s:'ENTRA', p:'R$ 32.90'}, {t:'BBAS3', s:'ENTRA', p:'R$ 54.20'},
        {t:'ABEV3', s:'PULA', p:'R$ 11.80'}, {t:'B3SA3', s:'PULA', p:'R$ 10.50'},
        {t:'ELET3', s:'ENTRA', p:'R$ 41.30'}, {t:'WEGE3', s:'ENTRA', p:'R$ 36.15'},
        {t:'RENT3', s:'PULA', p:'R$ 58.90'}, {t:'MGLU3', s:'NÃO ENTRA', p:'R$ 1.95'}
    ];

    const container = document.getElementById('grid');
    DATA_SAFE.forEach(item => {
        const color = item.s === 'ENTRA' ? 'var(--green)' : 'var(--red)';
        container.innerHTML += `
            <div class="card">
                <div><b>${item.t}</b><br><small style="color:#666">${item.p}</small></div>
                <div style="color:${color}; font-weight:800; border: 1px solid ${color}; padding: 4px 8px;">${item.s}</div>
            </div>`;
    });
</script>

<div style="position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; font-size: 10px; color: var(--green); border-top: 1px solid var(--green);">
    INTELLIGENCE: [SISTEMA RESILIENTE] OPERANDO SEM DEPENDÊNCIA DE API EXTERNA NO MOMENTO.
</div>

</body>
