<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TESTE SENTINEL // SYNC ÚNICO</title>
    <style>
        body { background: #020202; color: #eee; font-family: sans-serif; padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 10px; border-left: 5px solid #00ff41; width: 350px; }
        .price { font-size: 28px; font-weight: bold; margin: 15px 0; }
        .osc { font-size: 16px; margin-left: 10px; }
        .news-box { background: #111; padding: 10px; border-radius: 5px; font-size: 12px; color: #999; margin-top: 10px; border-top: 1px solid #222; }
        .label { color: #00ff41; font-size: 10px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="display">Aguardando JSON...</div>

<script>
    async function testarUnico() {
        const display = document.getElementById('display');
        
        try {
            // 1. LER O JSON QUE VOCÊ CONFIGUROU
            const response = await fetch('sentinel_data.json');
            const data = await response.json();
            const asset = data[0]; // PEGA APENAS O PRIMEIRO TICKET (VALE3 OU PETR4)

            display.innerHTML = `<div class="card"><b>PROCURANDO: ${asset.ticket}...</b></div>`;

            // 2. CONSULTA COTAÇÃO (CHAVE 1)
            const urlPrice = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${asset.ticket}.SAO&apikey=${asset.api_key_cotacao}`;
            
            // 3. CONSULTA NOTÍCIA (CHAVE 2)
            const urlNews = `https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${asset.ticket}&apikey=${asset.api_key_news}`;

            const resP = await fetch(urlPrice);
            const jsonP = await resP.json();
            
            const resN = await fetch(urlNews);
            const jsonN = await resN.json();

            if (jsonP["Global Quote"]) {
                const q = jsonP["Global Quote"];
                const preco = parseFloat(q["05. price"]).toFixed(2);
                const osc = parseFloat(q["10. change percent"].replace('%','')).toFixed(2);
                const corOsc = parseFloat(osc) >= 0 ? "#00ff41" : "#ff3131";
                
                // PEGA O RESUMO DA PRIMEIRA NOTÍCIA
                const noticia = jsonN.feed && jsonN.feed[0] ? jsonN.feed[0].summary : "Sem notícias recentes no radar.";

                display.innerHTML = `
                    <div class="card">
                        <b>${asset.ticket}</b>
                        <div class="price">
                            R$ ${preco} 
                            <span class="osc" style="color:${corOsc}">(${osc}%)</span>
                        </div>
                        <div class="news-box">
                            <span class="label">Radar de Notícias:</span>
                            ${noticia.substring(0, 150)}...
                        </div>
                    </div>
                `;
            } else {
                display.innerHTML = "ERRO: Chave de cotação inválida ou limite atingido.";
            }

        } catch (e) {
            display.innerHTML = "ERRO CRÍTICO: Verifique se o arquivo sentinel_data.json está correto.";
            console.error(e);
        }
    }

    testarUnico();
</script>
</body>
    
</html>
