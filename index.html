<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL V5.9.2 // 3YfY2Nvp75kG9ANMx4vrDx</title>
    <style>
        body { background: #000; color: #eee; font-family: sans-serif; padding: 15px; }
        .header { border-bottom: 2px solid #00ff41; padding: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; margin-bottom: 12px; border-radius: 8px; border-left: 5px solid #333; }
        .price { font-size: 24px; font-weight: bold; color: #fff; margin: 10px 0; }
        .osc { font-size: 14px; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <span><b>SENTINEL V5.9.2</b></span>
    <span id="clock">20:07:00</span>
</div>

<div id="app">CARREGANDO BASE...</div>

<script>
    // CHAVE INJETADA DIRETAMENTE NA CONSULTA [cite: 2026-02-28]
    const DATABASE = [
        { "t": "VALE3", "sem": "ENTRA" },
        { "t": "PETR4", "sem": "PULA" },
        { "t": "ITUB4", "sem": "ENTRA" }
    ];

    function render() {
        const container = document.getElementById('app');
        let html = '';
        DATABASE.forEach(item => {
            const cache = JSON.parse(localStorage.getItem(item.t)) || {p: "---", c: "0.00"};
            const cor = parseFloat(cache.c) >= 0 ? "#00ff41" : "#ff3131";
            html += `
                <div class="card" style="border-left-color: ${item.sem === 'ENTRA' ? '#00ff41' : '#f9d71c'}">
                    <b>${item.t}</b>
                    <div class="price">R$ ${cache.p} <span class="osc" style="color:${cor}">(${cache.c}%)</span></div>
                </div>`;
        });
        container.innerHTML = html;
    }

    async function sync() {
        const apiKey = "3YfY2Nvp75kG9ANMx4vrDx"; // CHAVE QUE VOCÊ PASSOU [cite: 2026-02-28]
        for (let asset of DATABASE) {
            try {
                // AQUI ESTÁ O PONTO E O SAO PARA B3 [cite: 2026-02-28]
                const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${asset.t}.SAO&apikey=${apiKey}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
                    const q = data["Global Quote"];
                    const p = parseFloat(q["05. price"]).toFixed(2);
                    const c = parseFloat(q["10. change percent"].replace('%','')).toFixed(2);
                    localStorage.setItem(asset.t, JSON.stringify({p: p, c: c}));
                    render();
                }
                // Aguarda 15s para a API não bloquear a chave [cite: 2026-02-28]
                await new Promise(r => setTimeout(r, 15000));
            } catch (e) { console.log("Erro no ticket " + asset.t); }
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    render();
    sync();
</script>
</body>
</
    html>
