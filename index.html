 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // BLINDAGEM JSON</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --yellow: #f9d71c; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { border-bottom: 2px solid var(--green); padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .asset-card { background: var(--card); border: 1px solid #1a1a1a; padding: 12px; margin-bottom: 6px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 10px; font-weight: bold; padding: 4px 8px; border: 1px solid; border-radius: 3px; }
        .time-info { font-size: 8px; color: #444; margin-top: 3px; }
    </style>
</head>
<body>

<div class="header">
    <span><b>SENTINEL V5</b> // BASE BLINDADA</span>
    <span id="clock" style="color:var(--green)">00:00:00</span>
</div>

<div id="asset-list"></div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    const TICKETS = [
        {t:'VALE3.SAO', s:'ENTRA', p:'72.45', n:'Minério estável em Dalian.'},
        {t:'PETR4.SAO', s:'PULA', p:'38.12', n:'Incerteza sobre política de dividendos.'},
        {t:'ITUB4.SAO', s:'ENTRA', p:'32.90', n:'Setor bancário com Selic alta.'},
        {t:'BBAS3.SAO', s:'ENTRA', p:'54.20', n:'Crédito agro impulsiona resultados.'},
        {t:'ABEV3.SAO', s:'PULA', p:'11.80', n:'Custos de insumos em análise.'}
    ];

    function render() {
        const list = document.getElementById('asset-list');
        list.innerHTML = '';
        TICKETS.forEach(item => {
            // Busca do banco local. Se não tiver nada, usa o valor padrão do JSON
            const saved = JSON.parse(localStorage.getItem(item.t)) || {price: item.p, change: '0.00', time: 'DADO INICIAL'};
            const color = item.s === 'ENTRA' ? 'var(--green)' : 'var(--yellow)';
            
            list.innerHTML += `
                <div class="asset-card">
                    <div>
                        <b>${item.t.split('.')[0]}</b>
                        <div style="font-size:11px; color:#888">R$ ${saved.price} (${saved.change}%)</div>
                        <div class="time-info">Sincronizado: ${saved.time}</div>
                    </div>
                    <div class="badge" style="color:${color}; border-color:${color}">${item.s}</div>
                </div>`;
        });
    }

    async function updateData() {
        const now = new Date().toLocaleTimeString('pt-BR');
        for (let i = 0; i < TICKETS.length; i++) {
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${TICKETS[i].t}&apikey=${API_KEY}`);
                const data = await res.json();
                if (data["Global Quote"]) {
                    const q = data["Global Quote"];
                    const info = {
                        price: parseFloat(q["05. price"]).toFixed(2),
                        change: parseFloat(q["10. change percent"]).toFixed(2),
                        time: now
                    };
                    localStorage.setItem(TICKETS[i].t, JSON.stringify(info));
                    render();
                }
                // Espera 30s entre cada ticket para não travar a API gratuita
                await new Promise(r => setTimeout(r, 30000));
            } catch (e) { console.warn("API Offline - Mantendo Cache"); }
        }
    }

    // Relógio e Ciclo de 10 minutos
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    render(); // Carrega o que está salvo na hora
    updateData(); // Inicia a atualização lenta em paralelo
    setInterval(updateData, 600000); // Repete a cada 10 minutos
</script>
</body>
<
    /html>
