<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // LIVE SYNC</title>
    <style>
        :root { --neon-green: #00ff41; --neon-red: #ff3131; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .market-header { background: var(--card); border: 1px solid #1a1a1a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-top: 3px solid var(--neon-green); }
        .op-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .asset-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 6px; padding: 12px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status-sync { font-size: 9px; color: var(--neon-green); text-align: center; margin: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="market-header">
    <small style="color:#666">B3 // IBOVESPA (COLETIVIDADE)</small>
    <div style="font-size: 24px; font-weight: 800;">107.200,56</div>
    <div style="color: var(--neon-red); font-size: 12px;">-1.04%</div>
</div>

<div id="sync-msg" class="status-sync">SINCRONIZANDO LOTE 1/2...</div>
<div class="op-grid" id="asset-list"></div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    const TICKETS = ['VALE3.SAO', 'PETR4.SAO', 'ITUB4.SAO', 'BBAS3.SAO', 'ABEV3.SAO', 'B3SA3.SAO', 'ELET3.SAO', 'WEGE3.SAO', 'RENT3.SAO', 'MGLU3.SAO'];

    async function loadBatch(start, end) {
        const list = document.getElementById('asset-list');
        const msg = document.getElementById('sync-msg');
        
        for (let i = start; i < end; i++) {
            const t = TICKETS[i];
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${t}&apikey=${API_KEY}`);
                const data = await response = await res.json();
                const q = data["Global Quote"];
                if (q) {
                    const change = parseFloat(q["10. change percent"]);
                    const color = change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
                    list.innerHTML += `
                        <div class="asset-card">
                            <span style="font-weight:800">${t.split('.')[0]}</span>
                            <div style="text-align:right">
                                <div style="color:${color}">${change.toFixed(2)}%</div>
                                <div style="font-size:10px; color:#444">R$ ${parseFloat(q["05. price"]).toFixed(2)}</div>
                            </div>
                        </div>`;
                }
            } catch (e) { console.error("Limite atingido", e); }
        }
        
        if (end < TICKETS.length) {
            msg.innerText = "AGUARDANDO COOL-DOWN API (60s)...";
            setTimeout(() => {
                msg.innerText = "SINCRONIZANDO LOTE 2/2...";
                loadBatch(5, 10);
            }, 62000);
        } else {
            msg.innerText = "● SISTEMA SINCRONIZADO";
        }
    }

    loadBatch(0, 5);
</script>
</body>
