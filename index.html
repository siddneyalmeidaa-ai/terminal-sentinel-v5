<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V10.0 // AUTO_DATA</title>
    <style>
        :root { --bg: #050505; --card: #111; --green: #00ff41; --yellow: #ffaa00; --red: #ff3131; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--green); padding-bottom: 5px; margin-bottom: 15px; font-size: 12px; }
        #painel { display: grid; gap: 10px; }
        .card { background: var(--card); border-left: 4px solid; padding: 15px; position: relative; border-radius: 4px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ticket-name { font-size: 20px; font-weight: bold; }
        .status-pill { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .price { font-size: 28px; font-weight: bold; color: var(--green); margin: 10px 0; display: flex; align-items: center; }
        .pulse { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 10px; }
        .news-container { background: #000; padding: 5px; margin: 5px 0; height: 20px; overflow: hidden; white-space: nowrap; border: 1px solid #222; }
        .news-scroll { display: inline-block; animation: scroll 15s linear infinite; font-size: 12px; color: var(--green); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        .op-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .data-label { font-size: 8px; color: #555; display: block; }
        .value { font-size: 12px; font-weight: bold; }
        .trava-tag { font-size: 9px; background: #222; color: #aaa; padding: 2px 4px; border-radius: 3px; margin-left: 5px; }
        footer { margin-top: 20px; text-align: center; font-size: 10px; color: #444; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<header>
    <span>SENTINEL_V10.0 // AUTO_DATA</span>
    <span id="clock">00:00:00</span>
</header>

<div id="painel"></div>

<footer id="status-log">INICIALIZANDO MOTOR...</footer>

<script>
    // URL DO SEU WORKER REAL (SYNC 0f66)
    const motorURL = "https://snowy-paper-0f66.siddney-almeidaa.workers.dev/"; 

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    async function ignition() {
        const painel = document.getElementById('painel');
        const log = document.getElementById('status-log');

        try {
            // Carrega a lista de 10 agentes do JSON [cite: 2026-02-28]
            const res = await fetch('sentinel_data.json');
            if (!res.ok) throw new Error("Arquivo JSON não encontrado");
            const agentes = await res.json();
            painel.innerHTML = ''; 

            agentes.forEach(a => {
                const cor = a.semaforo === "ENTRA" ? "#00ff41" : (a.semaforo === "PULA" ? "#ffaa00" : "#ff3131");
                painel.innerHTML += `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket-row">
                            <span class="ticket-name">${a.ticket} <span class="trava-tag">T: ${a.trava}</span></span>
                            <span class="status-pill" style="color: ${cor}; border: 1px solid ${cor}">${a.semaforo}</span>
                        </div>
                        <div class="price">
                            <span class="pulse" style="background-color:${cor}"></span>
                            <span id="price-${a.ticket}">CONECTANDO...</span>
                        </div>
                        <div class="label">Contexto e Gatilhos</div>
                        <div class="news-container">
                            <div class="news-scroll">${a.hist_24h} // FOCO: ${a.gatilhos}</div>
                        </div>
                        <div class="op-grid">
                            <div><span class="data-label">OSCILAÇÃO DIA</span><span class="value" id="day-${a.ticket}">0.00%</span></div>
                            <div><span class="data-label">PERF. 12 MESES</span><span class="value" id="perf-${a.ticket}">0.00%</span></div>
                        </div>
                    </div>`;
            });

            // Busca dados um a um (intervalo 350ms) [cite: 2026-01-23]
            for (let i = 0; i < agentes.length; i++) {
                await new Promise(r => setTimeout(r, 350));
                const a = agentes[i];
                
                fetch(`${motorURL}?ticket=${a.ticket}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.price) {
                            document.getElementById(`price-${a.ticket}`).innerText = `R$ ${data.price.toFixed(2)}`;
                            
                            const dayEl = document.getElementById(`day-${a.ticket}`);
                            dayEl.innerText = (data.changeDay >= 0 ? "+" : "") + data.changeDay.toFixed(2) + "%";
                            dayEl.style.color = data.changeDay >= 0 ? "#00ff41" : "#ff3131";

                            const perfEl = document.getElementById(`perf-${a.ticket}`);
                            perfEl.innerText = (data.perf12m >= 0 ? "+" : "") + data.perf12m.toFixed(2) + "%";
                            perfEl.style.color = data.perf12m >= 0 ? "#00ff41" : "#ff3131";
                        }
                    })
                    .catch(() => { 
                        document.getElementById(`price-${a.ticket}`).innerText = "SINAL FRACO"; 
                    });
            }
            log.innerText = `SISTEMA OPERACIONAL: ${agentes.length} AGENTES ATIVOS.`;
        } catch (e) { 
            log.innerText = "ERRO NA CARGA: " + e.message; 
        }
    }

    window.onload = ignition;
</script>
</bod
