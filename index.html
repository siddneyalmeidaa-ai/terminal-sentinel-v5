<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // ULTRA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --yellow: #f9d71c; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Cabeçalho Compacto */
        .market-header { background: var(--card); border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--green); }
        
        /* Container do Radar - Menor para caber tudo */
        .radar-box { background: var(--card); border: 1px solid #1a1a1a; border-radius: 8px; padding: 5px; height: 220px; margin-bottom: 10px; }
        
        /* Lista de Ativos Otimizada */
        .op-grid { display: flex; flex-direction: column; gap: 6px; padding-bottom: 80px; }
        .asset-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 6px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .ticker-name { font-weight: 800; font-size: 14px; }
        .badge { font-size: 9px; font-weight: bold; padding: 3px 8px; border-radius: 4px; border: 1px solid; min-width: 55px; text-align: center; }
        
        /* Active Intelligence Fixo */
        .active-intel { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid var(--green); padding: 8px 12px; font-size: 10px; z-index: 999; box-sizing: border-box; }
        .sync-loader { font-size: 8px; color: var(--green); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="market-header">
    <div><small style="color:#666">IBOVESPA</small><div style="font-size:16px; font-weight:800;">107.200,56</div></div>
    <div style="color:var(--red); font-size:14px; font-weight:800;">-1.04%</div>
</div>

<div class="radar-box">
    <canvas id="marketRadar"></canvas>
</div>

<div id="sync-msg" class="sync-loader">Sincronizando Ativos...</div>

<div class="op-grid" id="asset-list">
    </div>

<div class="active-intel">
    <b style="color:var(--green)">ACTIVE INTEL:</b> 
    <span id="news-text">[AGUARDANDO ATUALIZAÇÃO DOS GATILHOS...]</span>
</div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    const TICKETS = [
        {t:'VALE3.SAO', s:'ENTRA', v:90, n:'Minério subiu 1.2% em Dalian.'}, 
        {t:'PETR4.SAO', s:'PULA', v:40, n:'Incerteza sobre nova diretoria.'}, 
        {t:'ITUB4.SAO', s:'ENTRA', v:85, n:'Lucros resilientes no setor.'}, 
        {t:'BBAS3.SAO', s:'ENTRA', v:88, n:'Liberação de crédito recorde.'}, 
        {t:'ABEV3.SAO', s:'PULA', v:30, n:'Queda no custo de insumos.'}, 
        {t:'B3SA3.SAO', s:'PULA', v:35, n:'Queda de 5% no volume médio.'}, 
        {t:'ELET3.SAO', s:'ENTRA', v:82, n:'Níveis estáveis de reservatórios.'}, 
        {t:'WEGE3.SAO', s:'ENTRA', v:80, n:'Aumento de demanda industrial.'}, 
        {t:'RENT3.SAO', s:'PULA', v:45, n:'Venda de frotas sobe 3%.'}, 
        {t:'MGLU3.SAO', s:'NÃO ENTRA', v:15, n:'Manutenção da SELIC trava varejo.'}
    ];

    // Gráfico Radar Compacto
    const ctx = document.getElementById('marketRadar');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: TICKETS.map(x => x.t.split('.')[0]),
            datasets: [{
                data: TICKETS.map(x => x.v),
                backgroundColor: 'rgba(0, 255, 65, 0.1)',
                borderColor: '#00ff41',
                borderWidth: 1,
                pointRadius: 2
            }]
        },
        options: {
            scales: { r: { grid: { color: '#222' }, angleLines: { color: '#222' }, ticks: { display: false }, min: 0, max: 100 } },
            plugins: { legend: { display: false } },
            maintainAspectRatio: false
        }
    });

    async function startSync() {
        const list = document.getElementById('asset-list');
        const status = document.getElementById('sync-msg');
        const news = document.getElementById('news-text');

        for (let i = 0; i < TICKETS.length; i++) {
            if (i === 5) {
                status.innerText = "Pausa de segurança API (60s)...";
                await new Promise(r => setTimeout(r, 61000));
            }
            
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${TICKETS[i].t}&apikey=${API_KEY}`);
                const data = await res.json();
                const q = data["Global Quote"];
                
                if (q) {
                    const color = TICKETS[i].s === 'ENTRA' ? 'var(--green)' : (TICKETS[i].s === 'PULA' ? 'var(--yellow)' : 'var(--red)');
                    list.innerHTML += `
                        <div class="asset-card">
                            <div>
                                <span class="ticker-name">${TICKETS[i].t.split('.')[0]}</span>
                                <small style="display:block; color:#444">R$ ${parseFloat(q["05. price"]).toFixed(2)} (${parseFloat(q["10. change percent"]).toFixed(2)}%)</small>
                            </div>
                            <div class="badge" style="color:${color}; border-color:${color}">${TICKETS[i].s}</div>
                        </div>`;
                    news.innerText = `[${TICKETS[i].t.split('.')[0]}] ${TICKETS[i].n}`;
                }
            } catch (e) { console.error(e); }
        }
        status.innerText = "● TERMINAL OPERACIONAL";
    }
    startSync();
</script>
</body>
    
</html>
