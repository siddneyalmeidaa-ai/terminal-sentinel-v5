<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // MARKET COLLECTIVE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --neon-green: #00ff41; --neon-red: #ff3131; --neon-yellow: #f9d71c; 
            --bg-dark: #020202; --card-bg: rgba(20, 20, 20, 0.9);
        }
        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; }
        .app-shell { padding: 15px; max-width: 500px; margin: 0 auto; }
        
        /* Header com a Coletividade (IBOV) */
        .market-header {
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px;
            padding: 15px; margin-bottom: 20px; border-top: 3px solid var(--neon-green);
        }
        .ibov-value { font-size: 24px; font-weight: 800; display: block; }
        .ibov-label { font-size: 10px; color: #666; text-transform: uppercase; }

        /* Lista de Ativos com Oscilação */
        .op-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .asset-card {
            background: var(--card-bg); border: 1px solid #1a1a1a;
            border-radius: 6px; padding: 12px; display: flex; align-items: center;
            justify-content: space-between;
        }
        .oscillation-bar { height: 4px; background: #111; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .oscillation-fill { height: 100%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="market-header">
        <span class="ibov-label">B3 // IBOVESPA (COLETIVIDADE)</span>
        <span id="ibov-price" class="ibov-value">carregando...</span>
        <span id="ibov-change" style="font-size: 12px;">--%</span>
    </header>

    <div class="op-grid" id="asset-list">
        </div>
</div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ'; // Chave Alpha Vantage
    const TICKETS = ['VALE3.SAO', 'PETR4.SAO', 'ITUB4.SAO', 'B3SA3.SAO', 'MGLU3.SAO'];

    async function updateMarket() {
        // Busca a coletividade (IBOV via Ticket de Referência ou Proxy)
        const ibovRes = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=IBOV.SAO&apikey=${API_KEY}`);
        const ibovData = await ibovRes.json();
        const ibov = ibovData["Global Quote"];
        
        if(ibov) {
            document.getElementById('ibov-price').innerText = parseFloat(ibov["05. price"]).toLocaleString('pt-BR');
            const change = parseFloat(ibov["10. change percent"]);
            document.getElementById('ibov-change').innerText = `${change > 0 ? '+' : ''}${change.toFixed(2)}%`;
            document.getElementById('ibov-change').style.color = change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
        }

        const list = document.getElementById('asset-list');
        list.innerHTML = ''; // Limpa para atualizar

        for (const ticket of TICKETS) {
            const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${ticket}&apikey=${API_KEY}`);
            const data = await res.json();
            const quote = data["Global Quote"];

            if (quote) {
                const change = parseFloat(quote["10. change percent"]);
                const color = change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)';
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div style="width: 100%">
                        <div style="display:flex; justify-content:space-between">
                            <span style="font-weight:bold">${ticket.split('.')[0]}</span>
                            <span style="color:${color}; font-family:monospace">${change.toFixed(2)}%</span>
                        </div>
                        <div class="oscillation-bar">
                            <div class="oscillation-fill" style="width:${Math.abs(change) * 10}%; background:${color}"></div>
                        </div>
                        <small style="font-size:9px; color:#444">OSCILAÇÃO DIÁRIA</small>
                    </div>
                `;
                list.appendChild(card);
            }
        }
    }

    updateMarket();
    // Atualização a cada 5 minutos para respeitar a cota da API Free
    setInterval(updateMarket, 300000); 
</script>
</body>
    
</html>
