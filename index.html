<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TESTE DE OSCILAÇÃO ÚNICA</title>
    <style>
        body { background: #020202; color: #fff; font-family: sans-serif; padding: 20px; }
        .monitor { border: 2px solid #f9d71c; padding: 20px; border-radius: 10px; width: 300px; }
        .neon-price { font-size: 32px; font-weight: bold; display: block; }
        .neon-osc { font-size: 18px; color: #00ff41; }
    </style>
</head>
<body>

<div class="monitor">
    <b id="tite">PETR4</b>
    <span class="neon-price" id="preco">R$ ---</span>
    <span class="neon-osc" id="oscilacao">(0.00%)</span>
</div>

<script>
    async function testeUnico() {
        const tite = "PETR4";
        const apiKey = "BBA9X8Q14OFJIBRZ"; // Sua chave do print
        
        // RESOLUÇÃO: Adicionando o ponto e o SAO para a B3
        const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${tite}.SAO&apikey=${apiKey}`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data["Global Quote"]) {
                const quote = data["Global Quote"];
                const p = parseFloat(quote["05. price"]).toFixed(2);
                
                // LIMPEZA DA STRING PARA A OSCILAÇÃO APARECER
                const o = quote["10. change percent"]; 
                
                document.getElementById('preco').innerText = `R$ ${p}`;
                document.getElementById('oscilacao').innerText = `(${o})`;
                
                // Mudar cor se for negativo
                if (o.includes("-")) {
                    document.getElementById('oscilacao').style.color = "#ff3131";
                }
            } else {
                document.getElementById('preco').innerText = "ERRO API";
            }
        } catch (e) {
            document.getElementById('preco').innerText = "FALHA CONEXÃO";
        }
    }

    // Executa o teste assim que abrir a página
    testeUnico();
</script>
</body>
