<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V8.0 // BRAZIL-API</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .header { border-bottom: 2px solid #00ff41; padding: 10px 0; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; border-left: 6px solid #00ff41; }
        .ticket { font-size: 12px; color: #888; text-transform: uppercase; }
        .price { font-size: 42px; font-weight: bold; margin: 5px 0; color: #fff; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #004d1a; color: #00ff41; }
        #log { font-family: monospace; color: #444; font-size: 10px; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <span>SENTINEL_V8.0 (OPEN-SOURCE)</span>
    <span id="timer">20:49:00</span>
</div>

<div id="display">
    <div class="card" style="border-left-color: #333;">Conectando à BrazilAPI...</div>
</div>

<div id="log">SISTEMA: Iniciando busca direta (Sem Chave)...</div>

<script>
    async function motorV8() {
        const display = document.getElementById('display');
        const log = document.getElementById('log');
        const ATIVO = "PETR4";

        try {
            log.innerText = "SISTEMA: Consultando B3 via BrazilAPI...";
            
            // Consulta Direta - Sem necessidade de Proxy ou Chave [cite: 2026-02-28]
            const url = `https://brasilapi.com.br/api/cvm/codes/v1?ticker=${ATIVO}`;
            
            // Nota: Para cotações em tempo real simples, a BrazilAPI usa o endpoint de tickers
            const res = await fetch(`https://brasilapi.com.br/api/quote/v1/${ATIVO}`);
            const data = await res.json();

            if (data && data.regularMarketPrice) {
                const preco = data.regularMarketPrice.toFixed(2);
                const nome = data.longName || ATIVO;
                
                display.innerHTML = `
                    <div class="card">
                        <div class="ticket">${nome}</div>
                        <div class="price">R$ ${preco}</div>
                        <div class="status-badge">CONEXÃO DIRETA ATIVA</div>
                    </div>
                `;
                log.innerText = "SISTEMA: Dados carregados com sucesso.";
            } else {
                display.innerHTML = '<div class="card" style="border-color:orange">Ativo não encontrado ou API em manutenção.</div>';
            }
        } catch (e) {
            display.innerHTML = '<div class="card" style="border-color:red">Erro de Conexão. Verifique sua Internet.</div>';
            log.innerText = "DETALHE: " + e.message;
        }
    }

    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
    setTimeout(motorV8, 1000);
</script>
</body>
<
    /html>
