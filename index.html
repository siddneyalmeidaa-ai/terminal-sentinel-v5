<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V11.5 // SUPREMACIA</title>
    <style>
        :root { --bg: #050505; --card: #111; --green: #00ff41; --yellow: #ffaa00; --red: #ff3131; --blue: #007bff; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--green); padding: 10px; font-size: 11px; background: #000; position: sticky; top: 0; z-index: 100; }
        nav { display: grid; grid-template-columns: 1fr 1fr; background: #111; border-bottom: 1px solid #222; }
        nav button { background: none; border: none; color: #555; padding: 15px; font-family: 'Courier New'; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        nav button.active { color: var(--green); border-bottom-color: var(--green); background: #1a1a1a; }
        .view { display: none; padding: 10px; }
        .view.active { display: block; }
        .card { background: var(--card); border-left: 4px solid; padding: 12px; margin-bottom: 10px; border-radius: 4px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 24px; font-weight: bold; color: var(--green); margin: 5px 0; }
        .label { font-size: 9px; color: #555; text-transform: uppercase; margin-top: 8px; }
        .news-container { background: #000; padding: 6px; margin: 8px 0; height: 30px; overflow: hidden; white-space: nowrap; border: 1px solid #222; display: flex; align-items: center; }
        .news-scroll { display: inline-block; animation: scroll 25s linear infinite; font-size: 12px; color: var(--green); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        #chart-container { width: 100%; height: 450px; background: #000; border: 1px solid #222; margin-top: 5px; }
        .chart-controls { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; border-bottom: 1px solid #222; }
        .chart-controls button { background: #222; color: #eee; border: 1px solid #444; padding: 6px 12px; border-radius: 3px; font-size: 10px; white-space: nowrap; }
        .chart-controls button.selected { border-color: var(--green); color: var(--green); background: #003310; }
        footer { text-align: center; font-size: 9px; padding: 15px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <span>SENTINEL_V11.5 // SUPREMACIA</span>
    <span id="clock">00:00:00</span>
</header>

<nav>
    <button id="btn-painel" class="active" onclick="switchTab('painel')">PAINEL_DATA</button>
    <button id="btn-grafico" onclick="switchTab('grafico')">TRADER_VIEW</button>
</nav>

<div id="painel-view" class="view active">
    <div id="painel"></div>
</div>

<div id="grafico-view" class="view">
    <div class="chart-controls" id="ticket-selector"></div>
    <div id="chart-container">
        <div style="padding: 50px; text-align: center; color: #444;">SELECIONE UM AGENTE ACIMA...</div>
    </div>
</div>

<footer id="status-log">AGUARDANDO IGNICÃO...</footer>

<script>
    const motorURL = "https://snowy-paper-0f66.siddney-almeidaa.workers.dev/"; 
    let currentTicket = "";

    function switchTab(tab) {
        document.querySelectorAll('.view, nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(`${tab}-view`).classList.add('active');
        document.getElementById(`btn-${tab}`).classList.add('active');
    }

    async function ignition() {
        const painel = document.getElementById('painel');
        const selector = document.getElementById('ticket-selector');
        try {
            const res = await fetch('sentinel_data.json');
            const agentes = await res.json();
            painel.innerHTML = ''; selector.innerHTML = '';

            agentes.forEach(a => {
                const cor = a.semaforo === "ENTRA" ? "#00ff41" : (a.semaforo === "PULA" ? "#ffaa00" : "#ff3131");
                painel.innerHTML += `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket-row">
                            <span style="font-size:16px; font-weight:bold;">${a.ticket} <small style="font-size:8px; color:#444">T: ${a.trava}</small></span>
                            <span style="color:${cor}; font-size:9px; border:1px solid ${cor}; padding:1px 4px; border-radius:10px;">${a.semaforo}</span>
                        </div>
                        <div class="price" id="price-${a.ticket}">CARREGANDO...</div>
                        <div style="font-size:10px; color: #666;">VARIAÇÃO DIA: <span id="day-${a.ticket}">0.00%</span></div>
                        <div class="label">Contexto e Gatilhos</div>
                        <div class="news-container">
                            <div class="news-scroll">HISTÓRICO: ${a.hist_24h} // GATILHOS: ${a.gatilhos}</div>
                        </div>
                    </div>`;
                selector.innerHTML += `<button onclick="loadTicketChart('${a.ticket}')" id="sel-${a.ticket}">${a.ticket}</button>`;
                updateTicker(a.ticket);
            });
            document.getElementById('status-log').innerText = "SISTEMA OPERACIONAL.";
            if(agentes.length > 0) loadTicketChart(agentes[0].ticket);
        } catch (e) { document.getElementById('status-log').innerText = "ERRO: " + e.message; }
    }

    async function updateTicker(ticket) {
        try {
            const r = await fetch(`${motorURL}?ticket=${ticket}`);
            const data = await r.json();
            document.getElementById(`price-${ticket}`).innerText = `R$ ${data.price.toFixed(2)}`;
            const dayEl = document.getElementById(`day-${ticket}`);
            dayEl.innerText = (data.changeDay >= 0 ? "+" : "") + data.changeDay.toFixed(2) + "%";
            dayEl.style.color = data.changeDay >= 0 ? "#00ff41" : "#ff3131";
        } catch(e) {}
    }

    function loadTicketChart(t) {
        document.querySelectorAll('.chart-controls button').forEach(b => b.classList.remove('selected'));
        const btn = document.getElementById(`sel-${t}`);
        if(btn) btn.classList.add('selected');

        const container = document.getElementById('chart-container');
        const symbol = `BMFBOVESPA:${t}`;
        
        container.innerHTML = `
            <iframe 
                src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_suprema&symbol=${symbol}&interval=D&hidesidetoolbar=1&hidetoptoolbar=1&symboledit=1&saveimage=1&toolbarbg=000&studies=MA%40tv-basicstudies%7B%22length%22%3A9%7D%3BMA%40tv-basicstudies%7B%22length%22%3A21%7D&theme=dark&style=1&timezone=America%2FSao_Paulo&studies_overrides=%7B%22ma%209.line%20color%22%3A%22%2300ff41%22%2C%22ma%2021.line%20color%22%3A%22%23007bff%22%7D"
                width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no" allowfullscreen>
            </iframe>`;
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
    window.onload = ignition;
</script>
