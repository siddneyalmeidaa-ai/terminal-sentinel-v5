<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V5 // PERSISTENT</title>
    <style>
        :root { --green: #00ff41; --red: #ff3131; --yellow: #f9d71c; --bg: #020202; --card: #0a0a0a; }
        body { background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .market-header { background: var(--card); border: 1px solid #1a1a1a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-top: 3px solid var(--green); }
        .op-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .asset-card { background: var(--card); border: 1px solid #1a1a1a; border-radius: 6px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; border: 1px solid; min-width: 65px; text-align: center; }
    </style>
</head>
<body>

<div class="market-header">
    <small style="color:#666">B3 // IBOVESPA (COLETIVIDADE)</small>
    <div style="font-size: 24px; font-weight: 800;">107.200,56</div>
    <div style="color: var(--red); font-size: 12px;">-1.04% %</div>
</div>

<div id="status" style="font-size: 9px; color: var(--green); text-align: center; margin-bottom: 10px;">SINCRONIZANDO DADOS REAIS...</div>
<div class="op-grid" id="asset-list"></div>

<script>
    const API_KEY = 'BBA9X8Q14OFJIBRZ';
    const TICKETS = [
        {t:'VALE3.SAO', s:'ENTRA'}, {t:'PETR4.SAO', s:'PULA'}, {t:'ITUB4.SAO', s:'ENTRA'}, 
        {t:'BBAS3.SAO', s:'ENTRA'}, {t:'ABEV3.SAO', s:'PULA'}, {t:'B3SA3.SAO', s:'PULA'}, 
        {t:'ELET3.SAO', s:'ENTRA'}, {t:'WEGE3.SAO', s:'ENTRA'}, {t:'RENT3.SAO', s:'PULA'}, {t:'MGLU3.SAO', s:'NÃO ENTRA'}
    ];

    async function updateUI() {
        const list = document.getElementById('asset-list');
        list.innerHTML = '';
        
        for (let i = 0; i < TICKETS.length; i++) {
            const item = TICKETS[i];
            // Tenta pegar da memória se a API falhar
            const cached = JSON.parse(localStorage.getItem(item.t)) || { price: '0.00', change: '0.00' };
            const badgeColor = item.s === 'ENTRA' ? 'var(--green)' : (item.s === 'PULA' ? 'var(--yellow)' : 'var(--red)');
            
            list.innerHTML += `
                <div class="asset-card">
                    <div>
                        <div style="font-weight:800; font-size:16px">${item.t.split('.')[0]}</div>
                        <div style="font-size:10px; color:#444">R$ ${cached.price} (${cached.change}%)</div>
                    </div>
                    <div class="badge" style="color:${badgeColor}; border-color:${badgeColor}">${item.s}</div>
                </div>`;
        }
    }

    async function syncAPI() {
        const status = document.getElementById('status');
        for (let i = 0; i < TICKETS.length; i++) {
            if (i === 5) { // Pausa obrigatória para não travar a chave
                status.innerText = "RESPEITANDO LIMITE DA B3 (AGUARDE 60S)...";
                await new Promise(r => setTimeout(r, 61000));
            }
            
            try {
                const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${TICKETS[i].t}&apikey=${API_KEY}`);
                const data = await res.json();
                const q = data["Global Quote"];
                if (q) {
                    localStorage.setItem(TICKETS[i].t, JSON.stringify({
                        price: parseFloat(q["05. price"]).toFixed(2),
                        change: parseFloat(q["10. change percent"]).toFixed(2)
                    }));
                    updateUI(); // Atualiza um por um conforme chega
                }
            } catch (e) { console.error("Limite atingido"); }
        }
        status.innerText = "● SISTEMA SINCRONIZADO // DADOS EM CACHE";
    }

    updateUI(); // Mostra o que tem na memória primeiro
    syncAPI();  // Tenta atualizar com a B3
</script>
</body>
</
    html>
