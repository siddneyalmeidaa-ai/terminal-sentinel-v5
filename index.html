<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL V8.6 // FINAL PACT</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; }
        .header { border-bottom: 2px solid #00ff41; padding: 10px 0; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #333; transition: 0.3s; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .ticket-name { font-size: 18px; font-weight: 900; color: #fff; }
        .price { font-size: 32px; font-weight: bold; margin: 5px 0; color: #00ff41; }
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; background: #1a1a1a; }
        .label { font-size: 9px; color: #444; text-transform: uppercase; font-weight: bold; margin-top: 10px; border-top: 1px solid #111; padding-top: 5px; }
        .value { font-size: 11px; color: #999; margin-top: 2px; }
        #status-log { font-family: monospace; color: #222; font-size: 9px; margin-top: 40px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <span>SENTINEL_V8.6 // FÊNIX PRIME</span>
    <span id="timer">00:00:00</span>
</div>

<div id="painel" class="grid">
    <div class="card">Sincronizando dados locais...</div>
</div>

<div id="status-log">LOG: Aguardando sinal...</div>

<script>
    async function executarSentinel() {
        const painel = document.getElementById('painel');
        const log = document.getElementById('status-log');

        try {
            // 1. LER O JSON LOCAL PRIMEIRO
            const res = await fetch('sentinel_data.json');
            if (!res.ok) throw new Error("Falha ao acessar sentinel_data.json");
            const agentes = await res.json();
            
            painel.innerHTML = ''; // Limpa o carregamento

            // 2. DESENHAR OS CARDS IMEDIATAMENTE [cite: 2026-02-28]
            for (let a of agentes) {
                const cor = a.semaforo === "ENTRA" ? "#00ff41" : (a.semaforo === "PULA" ? "#ffaa00" : "#ff3131");
                
                const cardId = `price-${a.ticket}`;
                painel.innerHTML += `
                    <div class="card" style="border-left-color: ${cor}">
                        <div class="ticket-row">
                            <span class="ticket-name">${a.ticket}</span>
                            <span class="status-pill" style="color: ${cor}; border: 1px solid ${cor}">${a.semaforo}</span>
                        </div>
                        <div class="price" id="${cardId}">---</div>
                        
                        <div class="label">Gatilhos</div>
                        <div class="value">${a.gatilhos}</div>
                        
                        <div class="label">Operacional</div>
                        <div class="value">Trava: ${a.trava} | Perf: ${a.perf_12m}</div>
                    </div>`;

                // 3. BUSCAR PREÇO EM SEGUNDO PLANO (Yahoo Finance Bridge) [cite: 2026-02-28]
                fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${a.ticket}.SA`)
                    .then(r => r.json())
                    .then(data => {
                        const p = data.chart.result[0].meta.regularMarketPrice;
                        document.getElementById(cardId).innerText = `R$ ${p.toFixed(2)}`;
                    })
                    .catch(() => { document.getElementById(cardId).innerText = "OFFLINE"; });
            }
            log.innerText = "SISTEMA: " + agentes.length + " agentes carregados do JSON.";
        } catch (err) {
            log.innerText = "ERRO CRÍTICO: " + err.message;
            painel.innerHTML = `<div class="card" style="border-color:red">Erro ao carregar agentes. Verifique o arquivo JSON.</div>`;
        }
    }

    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
    setTimeout(executarSentinel, 500);
</script>
</body>

</html>
